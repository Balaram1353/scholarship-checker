name: Scholarship Checker

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install selenium twilio

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: "Attempt 1"
        id: attempt1
        continue-on-error: true
        env:
          ACCOUNT_SID: ${{ secrets.ACCOUNT_SID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          TO_WHATSAPP: ${{ secrets.TO_WHATSAPP }}
          APPLICATION_NUMBER: ${{ secrets.APPLICATION_NUMBER }}
        run: python script.py

      - name: "Wait 1hr -> Retry attempt 2"
        if: steps.attempt1.outcome == 'failure'
        id: attempt2
        continue-on-error: true
        env:
          ACCOUNT_SID: ${{ secrets.ACCOUNT_SID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          TO_WHATSAPP: ${{ secrets.TO_WHATSAPP }}
          APPLICATION_NUMBER: ${{ secrets.APPLICATION_NUMBER }}
        run: sleep 3600 && python script.py

      - name: "Wait 1hr -> Retry attempt 3"
        if: steps.attempt2.outcome == 'failure'
        id: attempt3
        continue-on-error: true
        env:
          ACCOUNT_SID: ${{ secrets.ACCOUNT_SID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          TO_WHATSAPP: ${{ secrets.TO_WHATSAPP }}
          APPLICATION_NUMBER: ${{ secrets.APPLICATION_NUMBER }}
        run: sleep 3600 && python script.py

      - name: "Wait 1hr -> Retry attempt 4 (final)"
        if: steps.attempt3.outcome == 'failure'
        env:
          ACCOUNT_SID: ${{ secrets.ACCOUNT_SID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          TO_WHATSAPP: ${{ secrets.TO_WHATSAPP }}
          APPLICATION_NUMBER: ${{ secrets.APPLICATION_NUMBER }}
        run: sleep 3600 && python script.py

      - name: Upload error screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error_screenshot.png
